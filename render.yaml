services:
  # ============ Backend 1: FitBot Chat Assistant API ============
  - type: web
    name: fitbot-api
    env: docker
    region: oregon
    plan: free
    branch: main
    rootDir: FYP-Assistent--main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
    healthCheckPath: /health

  # ============ Backend 2: Workout Suggestion API ============
  - type: web
    name: ai-workout-suggestion-api
    env: docker
    region: oregon
    plan: free
    branch: main
    rootDir: AI-Workout-Suggestion-main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  # ============ Backend 3: Exercise Detection API ============
  - type: web
    name: ai-fitness-exercises-api
    env: docker
    region: oregon
    plan: free
    branch: main
    rootDir: AI-Fitness-Trainer-Exercises-main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health

  # ============ Frontend: React/Vite Static Site ============
  - type: web
    name: ai-fitness-trainer-frontend
    env: static
    branch: main
    rootDir: AI-Fintess-Trainer-Frontend-V3-main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_EXERCISE_API_URL
        sync: false
      - key: VITE_WORKOUT_API_URL
        sync: false
      - key: VITE_ASSISTANT_API_URL
        sync: false
